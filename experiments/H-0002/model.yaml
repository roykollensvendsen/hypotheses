teacher:
  arch: mlp-3-layer
  input_dim: 3072
  hidden_dims: [512, 256]
  output_dim: 10
  activation: relu

student:
  arch: mlp-2-layer
  input_dim: 3072
  hidden_dim: 128
  output_dim: 10
  activation: relu

training:
  batch_size: 128
  max_steps: 20000

distillation:
  vanilla_logits:
    temperature: 4.0
    alpha: 0.7
  feature_matching:
    feature_layer: 1
    matching_weight: 1.0
