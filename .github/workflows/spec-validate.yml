name: Spec validation

on:
  pull_request:
    paths:
      - 'hypotheses/**'
      - 'docs/spec/02-hypothesis-format.md'
      - 'src/hypotheses/spec/schema/**'
      - 'scripts/check_schema_matches_doc.py'
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Hypothesis schema ↔ doc consistency
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Skip if schema tooling absent
        id: guard
        run: |
          if [ ! -f scripts/check_schema_matches_doc.py ] || \
             [ ! -f src/hypotheses/spec/schema/hypothesis.schema.json ]; then
            echo "schema tooling not yet implemented; no-op until Phase 1"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        if: steps.guard.outputs.skip == 'false'
        with:
          python-version: '3.12'
      - name: Install deps
        if: steps.guard.outputs.skip == 'false'
        run: pip install jsonschema pyyaml
      - name: Check spec ↔ schema consistency
        if: steps.guard.outputs.skip == 'false'
        run: python3 scripts/check_schema_matches_doc.py
      - name: Validate every hypothesis
        if: steps.guard.outputs.skip == 'false'
        run: python3 scripts/validate_hypotheses.py hypotheses/
