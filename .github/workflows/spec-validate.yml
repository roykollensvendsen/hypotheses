name: Spec validation

on:
  pull_request:
    paths:
      - 'hypotheses/**'
      - 'docs/spec/02-hypothesis-format.md'
      - 'src/hypotheses/spec/schema/**'
      - 'scripts/check_schema_matches_doc.py'
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: spec-validate-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Hypothesis schema ↔ doc consistency
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Skip if schema tooling absent
        id: guard
        run: |
          if [ ! -f scripts/check_schema_matches_doc.py ] || \
             [ ! -f src/hypotheses/spec/schema/hypothesis.schema.json ]; then
            echo "schema tooling not yet implemented; no-op until Phase 1"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        if: steps.guard.outputs.skip == 'false'
        with:
          python-version: '3.12.7'
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        if: steps.guard.outputs.skip == 'false'
        with:
          enable-cache: true
      - name: Check spec ↔ schema consistency
        if: steps.guard.outputs.skip == 'false'
        run: uv run scripts/check_schema_matches_doc.py
      - name: Validate every hypothesis
        if: steps.guard.outputs.skip == 'false'
        run: uv run scripts/validate_hypotheses.py hypotheses/
