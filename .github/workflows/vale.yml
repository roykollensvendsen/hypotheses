name: Vale prose lint (ratcheted)

on:
  pull_request:
    paths:
      - 'docs/spec/**'
      - 'VISION.md'
      - '.vale.ini'
      - '.vale/**'
      - 'scripts/check_vale_baseline.py'
      - '.github/workflows/vale.yml'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vale-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  vale:
    runs-on: ubuntu-latest
    name: Vale + baseline ratchet
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Skip if config absent
        id: guard
        run: |
          if [ ! -f .vale.ini ] || [ ! -f .vale/baseline.json ]; then
            echo "vale config or baseline absent; no-op"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install Vale
        if: steps.guard.outputs.skip == 'false'
        run: |
          VALE_VERSION=3.13.0
          curl -sSL "https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz" \
            | sudo tar -xz -C /usr/local/bin vale
          vale --version
      - name: Run ratcheted Vale check
        if: steps.guard.outputs.skip == 'false'
        run: python3 scripts/check_vale_baseline.py
