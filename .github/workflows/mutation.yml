name: Mutation testing

on:
  schedule:
    - cron: "0 4 * * *"  # nightly at 04:00 UTC
  workflow_dispatch:

jobs:
  mutmut:
    runs-on: ubuntu-latest
    name: Mutation score
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Skip if src/ absent
        id: guard
        run: |
          if [ ! -d src/hypotheses ]; then
            echo "no src/ yet; mutation job is a no-op until Phase 1"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        if: steps.guard.outputs.skip == 'false'
        with:
          python-version: '3.12'
      - name: Install uv
        if: steps.guard.outputs.skip == 'false'
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install deps
        if: steps.guard.outputs.skip == 'false'
        run: uv sync --extra dev
      - name: Run mutmut
        if: steps.guard.outputs.skip == 'false'
        run: uv run mutmut run --paths-to-mutate src/hypotheses
      - name: Enforce minimum score
        if: steps.guard.outputs.skip == 'false'
        run: python3 scripts/check_mutation_score.py --min 75
