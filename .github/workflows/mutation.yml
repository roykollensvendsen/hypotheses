name: Mutation testing

on:
  schedule:
    - cron: "0 4 * * *"  # nightly at 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutmut:
    runs-on: ubuntu-latest
    name: Mutation score
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Skip if Phase 1 prerequisites absent
        id: guard
        run: |
          if [ ! -f pyproject.toml ] || ! find src/hypotheses -name '*.py' 2>/dev/null | grep -q .; then
            echo "pyproject.toml or src/hypotheses python sources missing; mutation job is a no-op until Phase 1"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        if: steps.guard.outputs.skip == 'false'
        with:
          python-version: '3.12.7'
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        if: steps.guard.outputs.skip == 'false'
        with:
          enable-cache: true
      - name: Sync deps
        if: steps.guard.outputs.skip == 'false'
        run: uv sync --extra dev
      - name: Run mutmut
        if: steps.guard.outputs.skip == 'false'
        run: uv run mutmut run --paths-to-mutate src/hypotheses
      - name: Enforce minimum score
        if: steps.guard.outputs.skip == 'false'
        run: python3 scripts/check_mutation_score.py --min 75
