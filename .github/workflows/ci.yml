name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ruff:
    runs-on: ubuntu-latest
    name: ruff (lint + format)
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Find python sources
        id: guard
        run: |
          if find . -name '*.py' -not -path './.git/*' -print -quit | grep -q .; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "no python sources; no-op"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        if: steps.guard.outputs.skip == 'false'
        with:
          enable-cache: true
      - name: ruff check
        if: steps.guard.outputs.skip == 'false'
        run: uvx ruff check .
      - name: ruff format --check
        if: steps.guard.outputs.skip == 'false'
        run: uvx ruff format --check .

  pyright:
    runs-on: ubuntu-latest
    name: pyright (strict)
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Skip if pyproject absent
        id: guard
        run: |
          if [ ! -f pyproject.toml ]; then
            echo "no pyproject.toml; typecheck is a no-op until Phase 1"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        if: steps.guard.outputs.skip == 'false'
        with:
          python-version: '3.12.7'
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        if: steps.guard.outputs.skip == 'false'
        with:
          enable-cache: true
      - name: Sync deps
        if: steps.guard.outputs.skip == 'false'
        run: uv sync --extra dev
      - name: pyright --strict
        if: steps.guard.outputs.skip == 'false'
        run: uv run pyright

  pytest:
    runs-on: ubuntu-latest
    name: pytest (unit + integration + coverage)
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Skip if pytest files absent
        id: guard
        run: |
          if [ ! -d tests ] || ! find tests \( -name 'test_*.py' -o -name '*_test.py' \) 2>/dev/null | grep -q .; then
            echo "no pytest files yet; no-op until Phase 1"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        if: steps.guard.outputs.skip == 'false'
        with:
          python-version: '3.12.7'
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        if: steps.guard.outputs.skip == 'false'
        with:
          enable-cache: true
      - name: Sync deps
        if: steps.guard.outputs.skip == 'false'
        run: uv sync --extra dev
      - name: pytest
        if: steps.guard.outputs.skip == 'false'
        # Phase 0 ratchet: the coverage threshold lives in
        # pyproject.toml ([tool.coverage.report].fail_under) so a
        # Phase-1 PR can ratchet it from 0 → 85 in one place. The
        # spec target (HM-REQ-0040, docs/spec/12-implementation-
        # constraints.md) remains 85 % per package.
        run: |
          uv run pytest \
            --cov=hypotheses \
            --cov-report=term-missing \
            -n auto
