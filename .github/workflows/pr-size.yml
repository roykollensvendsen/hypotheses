name: PR size

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label-and-gate:
    runs-on: ubuntu-latest
    name: Label by size, fail on >500 LoC
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit
      - uses: CodelyTV/pr-size-labeler@095a41fca88b8764fd9e008ad269bcdb82bb38b9  # v1.10.4
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: 'size/xs'
          xs_max_size: 10
          s_label: 'size/s'
          s_max_size: 100
          m_label: 'size/m'
          m_max_size: 300
          l_label: 'size/l'
          l_max_size: 500
          xl_label: 'size/xl'
          fail_if_xl: true
          message_if_xl: |
            This PR changes more than 500 lines. Large PRs are harder to
            review and more likely to hide regressions. Split it into
            smaller PRs, each addressing one concern, before requesting
            review.
          files_to_ignore: |
            uv.lock
            LICENSE
            CHANGELOG.md
