name: Commitlint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: commitlint-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  commitlint:
    runs-on: ubuntu-latest
    name: Validate commit messages
    # Dependabot uses sentence-case commit subjects that fail our lowercase
    # rule. Require the PR to squash-merge via the GitHub UI, which rewrites
    # the commit message from the PR title (human-editable).
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@f133a0d95090ef2609192b4a21f54e20af819ea9  # v6
