name: Bandit security lint

on:
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/**'
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: bandit-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  bandit:
    runs-on: ubuntu-latest
    name: bandit on src/ and scripts/
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Skip if no python sources
        id: guard
        run: |
          if [ ! -d src ] && [ ! -d scripts ]; then
            echo "no python sources yet; no-op"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        if: steps.guard.outputs.skip == 'false'
        with:
          enable-cache: true
      - name: Run bandit
        if: steps.guard.outputs.skip == 'false'
        run: |
          TARGETS=""
          [ -d src ] && TARGETS="$TARGETS src"
          [ -d scripts ] && TARGETS="$TARGETS scripts"
          uvx bandit -r $TARGETS -ll
