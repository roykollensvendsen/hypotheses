name: Zizmor (workflow security lint)

on:
  schedule:
    - cron: "0 7 * * 1"   # Monday 07:00 UTC
  workflow_dispatch:

# Per-PR / per-push triggers were dropped because zizmor's
# `known-vulnerable-actions` audit queries the GitHub Advisories
# API once per action SHA. With the project's many SHA-pinned
# actions, a busy day collectively exhausts the 1,000 req/hr
# Actions installation quota and unrelated PR jobs start
# 403-ing. The weekly run is sufficient for advisory drift,
# and `action-pin-check.yml` already enforces SHA pinning on
# every PR independently.

permissions:
  contents: read
  security-events: write

concurrency:
  group: zizmor-${{ github.ref }}
  cancel-in-progress: false

jobs:
  zizmor:
    runs-on: ubuntu-latest
    name: Static analysis of GitHub Actions workflows
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e  # v0.5.3
        with:
          min-severity: medium
