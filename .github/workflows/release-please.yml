name: Release please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    name: Generate release PR from conventional commits
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: python
          package-name: hypotheses
