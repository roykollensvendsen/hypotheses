name: Dependency audit

on:
  schedule:
    - cron: "0 5 * * 1"   # Monday 05:00 UTC
  pull_request:
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
      - 'experiments/**/pyproject.toml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    name: pip-audit against pinned deps
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Skip if no pyproject.toml
        id: guard
        run: |
          if [ ! -f pyproject.toml ]; then
            echo "no pyproject.toml yet; no-op until Phase 1"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        if: steps.guard.outputs.skip == 'false'
        with:
          python-version: '3.12.7'
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        if: steps.guard.outputs.skip == 'false'
        with:
          enable-cache: true
      - name: Run pip-audit
        if: steps.guard.outputs.skip == 'false'
        # CVE-2026-3219 is in `pip` itself, which uvx installs into a
        # transient venv. It is not in our declared dependencies; the
        # ignore lifts as soon as pip-audit's pinned pip ratchets.
        run: uvx pip-audit --strict --ignore-vuln CVE-2026-3219
