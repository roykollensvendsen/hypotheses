name: Mark stale issues and PRs

on:
  schedule:
    - cron: "0 3 * * *"   # daily at 03:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    name: actions/stale 30/60/90
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f  # v10.2.0
        with:
          days-before-stale: 30
          days-before-close: 30
          stale-issue-message: >
            This issue has been inactive for 30 days and will be closed
            in 30 more unless a comment keeps it open. Labelled
            `pinned` or `security` issues are exempt.
          stale-pr-message: >
            This PR has been inactive for 30 days and will be closed
            in 30 more unless a comment keeps it open. Labelled
            `pinned` or `security` PRs are exempt.
          exempt-issue-labels: "pinned,security"
          exempt-pr-labels: "pinned,security"
          stale-issue-label: "stale"
          stale-pr-label: "stale"
