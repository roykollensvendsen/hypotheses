name: Hypothesis status validation

on:
  pull_request:
    paths:
      - 'hypotheses/H-*.md'
      - 'docs/spec/17-hypothesis-lifecycle.md'
      - 'scripts/check_hypothesis_status.py'
      - 'scripts/_doc_lib.py'
      - '.github/workflows/hypothesis-status.yml'
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: hypothesis-status-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    runs-on: ubuntu-latest
    name: hypothesis status enum membership
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Skip if checker absent
        id: guard
        run: |
          if [ ! -f scripts/check_hypothesis_status.py ]; then
            echo "checker not present; no-op"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        if: steps.guard.outputs.skip == 'false'
        with:
          python-version: '3.12.7'
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        if: steps.guard.outputs.skip == 'false'
        with:
          enable-cache: true
      - name: Run hypothesis-status validator
        if: steps.guard.outputs.skip == 'false'
        run: uv run scripts/check_hypothesis_status.py
