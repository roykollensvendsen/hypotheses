name: Docs impact analysis

on:
  pull_request:
    paths:
      - 'docs/spec/**/*.md'
      - 'agents/prompts/**'
      - 'scripts/docs_impact_comment.py'
      - '.github/workflows/docs-impact.yml'

permissions:
  contents: read

concurrency:
  group: docs-impact-${{ github.ref }}
  cancel-in-progress: true

jobs:
  report:
    runs-on: ubuntu-latest
    name: spec impact report
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - name: Skip if checker absent
        id: guard
        run: |
          if [ ! -f scripts/docs_impact_comment.py ]; then
            echo "checker not present; no-op"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        if: steps.guard.outputs.skip == 'false'
        with:
          python-version: '3.12.7'
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        if: steps.guard.outputs.skip == 'false'
        with:
          enable-cache: true
      - name: Generate impact report
        if: steps.guard.outputs.skip == 'false'
        run: |
          uv run scripts/docs_impact_comment.py \
            "origin/${{ github.base_ref }}" \
            "${{ github.event.pull_request.head.sha }}" \
            > impact.md
      - name: Post to job summary
        if: steps.guard.outputs.skip == 'false'
        run: cat impact.md >> "$GITHUB_STEP_SUMMARY"
