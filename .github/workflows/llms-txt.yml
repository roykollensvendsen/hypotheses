name: llms.txt snapshot

on:
  pull_request:
    paths:
      - 'VISION.md'
      - 'AGENTS.md'
      - 'docs/spec/**/*.md'
      - 'agents/prompts/**'
      - 'hypotheses/**'
      - 'llms.txt'
      - 'llms-full.txt'
      - 'scripts/gen_llms_txt.py'
      - 'scripts/_doc_lib.py'
      - '.github/workflows/llms-txt.yml'
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: llms-txt-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    runs-on: ubuntu-latest
    name: llms.txt regenerated and committed
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Skip if generator absent
        id: guard
        run: |
          if [ ! -f scripts/gen_llms_txt.py ]; then
            echo "generator not present; no-op"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        if: steps.guard.outputs.skip == 'false'
        with:
          python-version: '3.12.7'
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        if: steps.guard.outputs.skip == 'false'
        with:
          enable-cache: true
      - name: Regenerate
        if: steps.guard.outputs.skip == 'false'
        run: uv run scripts/gen_llms_txt.py
      - name: Verify committed copy is up-to-date
        if: steps.guard.outputs.skip == 'false'
        run: |
          if ! git diff --exit-code llms.txt llms-full.txt; then
            echo "::error::llms.txt or llms-full.txt is stale. Run scripts/gen_llms_txt.py and commit."
            exit 1
          fi
