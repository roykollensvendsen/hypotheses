version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      security:
        patterns: ["*"]
        update-types: ["security"]
      minor:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
    labels: ["deps"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels: ["ci", "deps"]
